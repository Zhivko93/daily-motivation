name: Daily Motivational Quote

on:
  schedule:
    - cron: "7 7 * * *"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python daily_motivational_quote_to_discord.py
        env:
          DISCORD_QUOTES_WEBHOOK_URL: ${{ secrets.DISCORD_QUOTES_WEBHOOK_URL }}

      - name: Commit updated sent quote history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_quotes.json
          git diff --cached --quiet || git commit -m "Update sent quotes history"
          git push
